name: CI

on:
  push:
    paths:
      - "packages/**"
      - "artifacts/**"
      - "fixtures/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "app/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "packages/**"
      - "artifacts/**"
      - "fixtures/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "app/**"
      - ".github/workflows/**"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run

  build-desktop:
    if: github.event_name == 'release'
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Bundle bridge worker
        working-directory: app
        run: node scripts/bundle-bridge.mjs

      - name: Build Tauri app
        working-directory: app
        run: npx tauri build

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/src-tauri/target/release/bundle/msi/*.msi
            app/src-tauri/target/release/bundle/nsis/*.exe
