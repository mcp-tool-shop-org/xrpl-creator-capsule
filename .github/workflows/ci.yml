name: CI

on:
  push:
    paths:
      - "packages/**"
      - "artifacts/**"
      - "fixtures/**"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "packages/**"
      - "artifacts/**"
      - "fixtures/**"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run
